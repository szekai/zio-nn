<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{ page.title | default: site.title }}</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/github-fork-ribbon-css/0.2.3/gh-fork-ribbon.min.css" />
  {% if site.remote_theme contains 'cayman' %}
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/jekyll-theme-cayman@1.0.1/assets/css/style.css">
  {% endif %}
  <!-- KaTeX for LaTeX math rendering -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/katex.min.css">
  <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/katex.min.js"></script>
  <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/contrib/auto-render.min.js"></script>
  <!-- Mermaid.js for diagram rendering -->
  <script src="https://cdn.jsdelivr.net/npm/mermaid@11/dist/mermaid.min.js"></script>
  <style>
    .main-content { max-width: 64rem; padding: 2rem 1rem; margin: 0 auto; }
    .page-header { padding-top: 1rem; }
    .page-header .project-tagline { margin-bottom: 0.5rem; }
    .main-content pre { white-space: pre-wrap; }
    .main-content code { font-size: 0.85em; }
    nav.docs-nav { margin-bottom: 2rem; padding: 0.5rem; background: #f6f6f6; border-radius: 4px; }
    nav.docs-nav a { margin-right: 1.5rem; }
    table { width: 100%; }
    @media (max-width: 42rem) {
      .main-content { padding: 1rem; }
    }
  </style>
</head>
<body>
  <header class="page-header" role="banner">
    <h1 class="project-name"><a href="{{ '/' | relative_url }}" style="color:inherit;text-decoration:none">{{ site.title }}</a></h1>
    <h2 class="project-tagline">{{ site.description }}</h2>
    <nav class="docs-nav">
      <a href="{{ '/' | relative_url }}">Home</a>
      <a href="{{ '/USER_GUIDE.html' | relative_url }}">User Guide</a>
      <a href="{{ '/TENSOROPS.html' | relative_url }}">Tensor Ops</a>
      <a href="{{ '/api/index.html' | relative_url }}">Scaladoc API</a>
      <a href="https://github.com/szekai/zio-nn">GitHub</a>
    </nav>
  </header>

  <main id="content" class="main-content" role="main">
    {{ content }}
  </main>

  <script async defer src="https://buttons.github.io/buttons.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', function() {
      // Auto-render $$...$$ and \(...\) math delimiters with KaTeX
      if (typeof renderMathInElement === 'function') {
        renderMathInElement(document.body, {
          delimiters: [
            {left: '$$', right: '$$', display: true},
            {left: '\\(', right: '\\)', display: false}
          ],
          throwOnError: false
        });
      }
      // Initialize mermaid diagrams
      if (typeof mermaid !== 'undefined') {
        mermaid.initialize({startOnLoad: true, theme: 'default'});
      }
    });
  </script>
</body>
</html>
